name: CodeQL

permissions:
  contents: read

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '27 3 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@86dbaf4b509bfc3b6dbed34009070cfae815ffde # v3.37.2
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@86dbaf4b509bfc3b6dbed34009070cfae815ffde # v3.37.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@86dbaf4b509bfc3b6dbed34009070cfae815ffde # v3.37.2
        with:
          category: "/language:${{ matrix.language }}"
