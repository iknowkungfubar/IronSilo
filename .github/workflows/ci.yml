name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linting
        run: |
          pip install ruff mypy
          ruff check .
          mypy proxy swarm genesys security mcp pipeline cache tui --ignore-missing-imports || true

      - name: Run tests with coverage
        run: |
          pip install pytest pytest-asyncio pytest-cov httpx
          pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build proxy image
        run: |
          docker build -f proxy/Dockerfile -t ironsilo-proxy:test proxy/

      - name: Build genesys image
        run: |
          docker build -f genesys/Dockerfile -t ironsilo-genesys:test genesys/

      - name: Build swarm image
        run: |
          docker build -f swarm/Dockerfile -t ironsilo-swarm:test swarm/

      - name: Build MCP image
        run: |
          docker build -f mcp/Dockerfile -t ironsilo-mcp:test mcp/