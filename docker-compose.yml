x-resources: &default-limits
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 512M

services:
  # Phase 4: Replaced Traefik with Caddy
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - internal_bridge
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  ironclaw-db:
    image: pgvector/pgvector:pg15
    container_name: ironclaw-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ironsilo_vault}
      POSTGRES_USER: ${POSTGRES_USER:-silo_admin}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD must be set in .env file}"
    volumes:
      - ironclaw-pg-data:/var/lib/postgresql/data
    networks:
      - internal_bridge
    <<: *default-limits
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-silo_admin} -d ${POSTGRES_DB:-ironsilo_vault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag:
    build: ./rag
    container_name: ironsilo-rag
    volumes:
      - rag-data:/data/rag
    environment:
      - RAG_WORKING_DIR=/data/rag
    networks:
      - internal_bridge
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  memory:
    build: ./memory
    container_name: ironsilo-memory
    depends_on:
      ironclaw-db:
        condition: service_healthy
    environment:
      - MEMORY_BACKEND=sqlite
      - DATABASE_URL=postgresql://${POSTGRES_USER:-silo_admin}:${POSTGRES_PASSWORD:-}@ironclaw-db:5432/${POSTGRES_DB:-ironsilo_vault}
    networks:
      - internal_bridge
    <<: *default-limits
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  llm-proxy:
    build: ./proxy
    container_name: llm-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://host.docker.internal:8000/v1/chat/completions}
      - IRONSILO_API_KEY=${IRONSILO_API_KEY:-}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-60}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    networks:
      - internal_bridge
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mcp-rag:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    container_name: mcp-rag
    environment:
      - MCP_SERVER_TYPE=rag
      - RAG_API_URL=http://rag:8010
      - IRONSILO_API_KEY=${IRONSILO_API_KEY:-}
    depends_on:
      - rag
    networks:
      - internal_bridge
    command: ["python", "-m", "uvicorn", "mcp.khoj_server:app", "--host", "0.0.0.0", "--port", "8000"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/search
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:?SEARXNG_SECRET_KEY must be set in .env}
    networks:
      - internal_bridge
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  browser-node:
    image: browserless/chrome:latest
    container_name: browser-node
    environment:
      - CONNECTION_TIMEOUT=60000
      - STEALTH=true
    networks:
      - internal_bridge
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  swarm-service:
    build: ./swarm
    container_name: swarm-service
    environment:
      - CDP_URL=ws://browser-node:9222
      - OPENAI_API_BASE=http://llm-proxy:8001/api/v1
      - MEMORY_URL=http://memory:8020
    depends_on:
      - llm-proxy
      - memory
      - browser-node
    networks:
      - internal_bridge
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  internal_bridge:
    driver: bridge
    internal: false
    name: internal_bridge

volumes:
  ironclaw-pg-data:
  rag-data:
  memory-data:
  hf-cache:
  searxng-data:
