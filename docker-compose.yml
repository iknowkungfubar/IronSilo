x-resources: &default-limits
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 512M

services:
  ironclaw-db:
    image: pgvector/pgvector:pg15
    container_name: ironclaw-db
    environment:
      POSTGRES_DB: ironsilo_vault
      POSTGRES_USER: silo_admin
      POSTGRES_PASSWORD: silo_password
    ports:
      - "5432:5432"
    volumes:
      - ironclaw-pg-data:/var/lib/postgresql/data
    <<: *default-limits

  genesys-memory:
    build: ./genesys
    container_name: genesys-memory
    depends_on:
      - ironclaw-db
    environment:
      - GENESYS_BACKEND=postgres
      - DATABASE_URL=postgresql://silo_admin:silo_password@ironclaw-db:5432/ironsilo_vault
      - GENESYS_EMBEDDER=local
    ports:
      - "8002:8000"
    <<: *default-limits

  khoj:
    image: ghcr.io/khoj-ai/khoj:latest
    container_name: khoj
    ports:
      - "42110:42110"
    volumes:
      - khoj-data:/root/.khoj
    command: ["--host=0.0.0.0", "--port=42110", "-vv", "--anonymous-mode", "--non-interactive"]
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G

  llm-proxy:
    build: ./proxy
    container_name: llm-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # This allows a root .env file to dynamically override the LLM endpoint
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://host.docker.internal:8000/v1/chat/completions}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G

  mcp-genesys:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: mcp-genesys
    environment:
      - MCP_SERVER_TYPE=genesys
      - GENESYS_API_URL=http://genesys-memory:8000
    depends_on:
      - genesys-memory
      - ironclaw-db
    ports:
      - "8003:8000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp-khoj:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: mcp-khoj
    environment:
      - MCP_SERVER_TYPE=khoj
      - KHOJ_API_URL=http://khoj:42110
    depends_on:
      - khoj
    ports:
      - "8004:8000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  ironclaw-pg-data:
  khoj-data:
  hf-cache:
  searxng-data: