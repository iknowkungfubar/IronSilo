repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-docstring-first

  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "120"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--extend-ignore=E203,W503"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports", "--disallow-untyped-defs"]
        additional_dependencies:
          - types-python-dateutil
          - types-PyYAML

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies:
          - "bandit[toml]"

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.0
    hooks:
      - id: pyupgrade
        args: [--py310-plus]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, markdown]
        additional_dependencies:
          - prettier@3.1.0

  - repo: local
    hooks:
      - id: check-docker-compose
        name: Check Docker Compose
        entry: docker compose config
        language: system
        pass_filenames: false
        files: docker-compose\.yml

      - id: check-tests-exist
        name: Check tests exist
        entry: bash -c 'for file in $(find . -name "*.py" -not -path "./tests/*" -not -path "./.git/*" -not -path "./__pycache__/*"); do test_file="tests/unit/test_$(basename $file)"; if [ ! -f "$test_file" ]; then echo "Missing test: $test_file"; exit 1; fi; done'
        language: system
        pass_filenames: false
        files: ^.*\.py$
        exclude: ^tests/.*$
